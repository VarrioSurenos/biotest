  <body>
    <div class="stars-container" aria-hidden="true"></div>

    <div id="announcement-banner-container"></div>

    <div class="content-wrapper">
      <!-- This new div allows the card and the credit link to stack vertically while remaining centered on the page -->
      <div class="w-full flex flex-col items-center">
        <div class="profile-card">
          <div class="card-shine"></div>
          <div class="profile-image-wrapper">
            <div class="profile-image-container">
              <img
                id="profileImage"
                alt="Profile Picture"
                width="120"
                height="120"
                fetchpriority="high"
              />
            </div>
          </div>

          <div class="profile-text-content">
            <h1 id="profileName" class="profile-name"></h1>
            <p id="profileDescription" class="profile-description"></p>
          </div>

          <div id="linksContainer" class="links-container mt-8"></div>

          <p id="footerContent" class="footer-text"></p>
        </div>

        <!-- I would appreciate it if you kept the branding, but it's absolutley not required and can be removed by deleting the next 6 lines of code! :) -->
        <p class="footer-text text-center mt-4 text-xs">
          <br />
          <a
            href="https://sentinellookup.info"
            target="_blank"
            rel="noopener noreferrer"
            class="hover:underline opacity-75 hover:opacity-100 transition-opacity"
          >
            Plutonium
          </a>
        </p>
      </div>
    </div>

    <div id="status-modal" class="hidden">
      <div id="status-modal-overlay"></div>
      <div id="status-modal-content">
        <button
          id="status-modal-close"
          class="flex items-center justify-center"
          aria-label="Close schedule"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </button>
        <h2 id="status-modal-title" class="text-2xl font-bold text-white mb-6 text-center"></h2>
        <div class="space-y-6">
          <div>
            <h3 id="status-modal-weekday-title" class="text-lg font-semibold text-white mb-3"></h3>
            <ul id="weekday-schedule-list" class="schedule-list bg-black/20 rounded-lg p-1"></ul>
          </div>
          <div>
            <h3 id="status-modal-weekend-title" class="text-lg font-semibold text-white mb-3"></h3>
            <ul id="weekend-schedule-list" class="schedule-list bg-black/20 rounded-lg p-1"></ul>
          </div>
        </div>
      </div>
    </div>

    <script>
      if (typeof CONFIG !== 'undefined' && CONFIG.profile && CONFIG.profile.profileImage) {
        document.getElementById('profileImage').src = CONFIG.profile.profileImage;
      }
    </script>
    <script src="app.js" defer></script>
